# Fly.io config for Aegis. The `app` field is set by `fly launch`.
# This is a starter; tweak `primary_region` to your nearest Fly region.
#
# Persistence note: this config uses the dummy fixture baked into the
# image. Anything the app appends at runtime (e.g., generated questions
# in bulk_import_output.xlsx) does NOT survive a redeploy. To persist,
# add a `[[mounts]]` block + a volume — see Fly docs.

app = "aegis"
primary_region = "bom"  # Mumbai; pick yours: `fly platform regions`

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
